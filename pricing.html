<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pricing — TBD.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://db.onlinewebfonts.com/c/440b53b1a1c65037f944ff19259d8014?family=Nokia+Cellphone+FC+Small" rel="stylesheet">
<style>
  :root { --cyan: #46E0FF; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #F3F4ED;
    font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: #1a1a1a; text-decoration: none; }
  a:hover { opacity: 0.7; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .stage {
    position: relative; min-height: 100vh;
    background: #F3F4ED; overflow: hidden;
  }
  .bg-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }
  .video-tint { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.05); z-index: 1; }

  /* ---- Nav ---- */
  .nav-shell {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    width: 95%; max-width: 1024px; z-index: 50; pointer-events: none;
  }
  nav.pill {
    pointer-events: auto;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 9999px;
    background: rgba(8, 12, 20, 0.55);
    border: 1px solid rgba(70, 224, 255, 0.28);
    box-shadow: 0 0 28px rgba(70, 224, 255, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand .spark {
    font-size: 20px; color: var(--cyan);
    text-shadow: 0 0 10px rgba(70, 224, 255, 0.9); user-select: none; line-height: 1;
  }
  .brand .name { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; letter-spacing: 0.1em; }
  .nav-links { display: flex; align-items: center; gap: 40px; }
  .nav-links a {
    font-size: 12px; color: rgba(255, 255, 255, 0.75);
    letter-spacing: 0.18em; text-transform: uppercase;
    transition: color .2s, text-shadow .2s;
  }
  .nav-links a:hover { color: #fff; text-shadow: 0 0 12px rgba(70, 224, 255, 0.8); opacity: 1; }
  .btn-get {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, #0871E7, #00C6FF);
    color: #fff; font-size: 12px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 10px 26px; border-radius: 9999px;
    box-shadow: 0 0 18px rgba(0, 198, 255, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.35);
  }
  .btn-get .gloss {
    position: absolute; width: 80%; height: 16px; left: 10%; top: 1px;
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.55), transparent);
    border-radius: 12px; transition: transform .3s;
  }
  .btn-get .label { position: relative; }

  /* ---- Content ---- */
  .content {
    position: relative; z-index: 20; pointer-events: none;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 128px 24px 0;
  }
  .content h1 {
    margin: 0 0 24px;
    font-size: clamp(28px, 4vw, 48px); line-height: 1.05;
    letter-spacing: -0.02em; color: #1a1a1a; font-weight: 500;
    text-shadow: 0 2px 28px rgba(243, 244, 237, 0.95), 0 0 12px rgba(243, 244, 237, 0.9);
    transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1), transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0; transform: scale(0.95);
  }
  .content h1.entered { opacity: 1; transform: scale(1); }

  .content .sub {
    margin: 22px auto 0; max-width: 520px;
    font-size: clamp(15px, 1.4vw, 17px);
    color: rgba(26, 26, 26, 0.82); line-height: 1.6;
    text-shadow: 0 2px 16px rgba(243, 244, 237, 0.98), 0 1px 5px rgba(243, 244, 237, 0.95);
    transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1) .3s, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1) .3s;
    opacity: 0; transform: translateY(20px);
  }

  /* Soft wash over the top of the video so headline/subtext read as
     floating on background, not on the phone, at any viewport height. */
  .top-scrim {
    position: absolute; top: 0; left: 0; right: 0;
    height: 56vh; z-index: 5; pointer-events: none;
    background: linear-gradient(to bottom,
      rgba(243, 244, 237, 0.94) 0%,
      rgba(243, 244, 237, 0.72) 45%,
      rgba(243, 244, 237, 0) 100%);
  }
  .content .sub.entered { opacity: 1; transform: translateY(0); }

  .pager-msg {
    position: absolute; left: 48.5%; transform: translateX(-50%);
    bottom: 32%; z-index: 30; width: 130px;
    display: flex; justify-content: flex-start; text-align: left;
  }
  .pager-msg .text {
    font-family: 'Nokia Cellphone FC Small', monospace;
    color: #2A3616; font-size: 14px; line-height: 1.25;
    word-break: break-word; min-height: 1.5em;
  }
  .pager-msg .cursor {
    display: inline-block; width: 6px; height: 12px;
    background: #2A3616; margin-left: 4px; vertical-align: middle;
    animation: blink 0.8s linear infinite;
  }

  /* Short / letterboxed viewports: the centered phone fills the height,
     so lift and tighten the copy to keep it clear of the handset. */
  @media (max-height: 640px) {
    .content { padding-top: 104px; }
    .content h1 { font-size: clamp(21px, 3vw, 32px); margin-bottom: 10px; }
    .content .sub { font-size: 13.5px; margin-top: 10px; max-width: 480px; }
    .top-scrim { height: 48vh; }
  }

  @media (prefers-reduced-motion: reduce) {
    .content h1, .content .sub { transition: none; }
    .pager-msg .cursor { animation: none; }
  }
</style>
<link rel="stylesheet" href="site.css">
</head>
<body>
<div class="stage">
  <div class="nav-shell">
    <nav class="pill">
      <div class="brand">
        <span class="spark">&#10035;&#65038;</span>
        <a class="name" href="index.html" id="brandName">TBD.ai</a>
      </div>
      <div class="nav-links">
        <a href="capabilities.html">Capabilities</a>
        <a href="method.html">Method</a>
        <a href="contact.html">Contact</a>
      </div>
      <a class="btn-get" href="contact.html">
        <span class="gloss"></span>
        <span class="label">Get in touch</span>
      </a>
    </nav>
  </div>

  <video class="bg-video" id="bgVideo"
    src="videos/pricing.mp4"
    preload="auto" muted playsinline loop></video>
  <div class="video-tint"></div>
  <div class="top-scrim"></div>

  <div class="content">
    <h1 id="headline">Expecting an<br>iPhone 17 Pro invoice?<br>Think again.</h1>
    <p id="subtext" class="sub">Custom software without the enterprise invoice. Every build is priced by what it saves you, not by the hour. Get in contact for details.</p>
  </div>

  <div class="pager-msg">
    <span class="text"><span id="pagerText"></span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function () {
  var config = { businessName: 'TBD.ai' };
  document.getElementById('brandName').textContent = config.businessName;
  document.title = 'Pricing — ' + config.businessName;

  var v = document.getElementById('bgVideo');
  if (v) {
    v.muted = true; v.playsInline = true; v.loop = true;
    var p = v.play(); if (p && p.catch) p.catch(function () {});
  }

  // ---- Entrance ----
  setTimeout(function () {
    document.getElementById('headline').classList.add('entered');
    document.getElementById('subtext').classList.add('entered');
  }, 60);

  // ---- Typing pager loop ----
  var messages = ["What's the damage?", "Less than you think.", "Talk to us."];
  var pagerText = document.getElementById('pagerText');
  var msgIdx = 0, ch = 0, deleting = false;

  function tick() {
    var msg = messages[msgIdx];
    if (!deleting) {
      ch++;
      pagerText.textContent = msg.slice(0, ch);
      if (ch >= msg.length) { deleting = true; setTimeout(tick, 2000); return; }
      setTimeout(tick, 100);
    } else {
      ch--;
      pagerText.textContent = msg.slice(0, ch);
      if (ch <= 0) { deleting = false; msgIdx = (msgIdx + 1) % messages.length; }
      setTimeout(tick, 50);
    }
  }
  setTimeout(tick, 600);
})();
</script>
<script src="site.js"></script>
</body>
</html>
